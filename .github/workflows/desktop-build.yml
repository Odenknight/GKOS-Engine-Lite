name: desktop-build

# Builds the unsigned GKOS Engine Desktop installers (.dmg / .exe NSIS) on the
# CI matrix. Rust/Tauri compilation happens ONLY here — there is no local Rust
# toolchain. Trigger manually, or on a `desktop-v*` tag to cut a Release.
on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

# Sidecar binaries come from the GKOS-Engine v1.0.9 release (public repo, no
# auth needed for the download). v1.0.9 adds the loopback CORS allowlist the 3D
# viewer's cross-origin fetches require. If those assets are missing, fall back
# to building the SEA in-run from the engine at v1.0.9.
env:
  ENGINE_REPO: Odenknight/GKOS-Engine
  ENGINE_TAG: v1.0.9

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            asset: kosmos-agent-aarch64-apple-darwin
            binext: ""
          # Intel runner: host arch matches the x86_64 target, so the SEA
          # fallback (build-sea.mjs names output by host arch) produces the
          # correct binary and tauri builds a native x86_64 .dmg. macos-latest
          # is Apple Silicon and cannot produce an x86_64 mac sidecar this way.
          - platform: macos-13
            target: x86_64-apple-darwin
            asset: kosmos-agent-x86_64-apple-darwin
            binext: ""
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            asset: kosmos-agent-x86_64-pc-windows-msvc.exe
            binext: ".exe"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install frontend deps
        working-directory: desktop
        run: npm ci

      - name: Generate app icons (unsigned; deterministic from app-icon.png)
        working-directory: desktop
        run: npx --yes @tauri-apps/cli@^2 icon src-tauri/app-icon.png

      - name: Acquire kosmos-agent sidecar
        shell: bash
        working-directory: desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p src-tauri/binaries
          dest="src-tauri/binaries/kosmos-agent-${{ matrix.target }}${{ matrix.binext }}"
          echo "Trying to download ${{ matrix.asset }} from ${ENGINE_REPO}@${ENGINE_TAG}…"
          if gh release download "${ENGINE_TAG}" \
               --repo "${ENGINE_REPO}" \
               --pattern "${{ matrix.asset }}" \
               --output "${dest}" ; then
            echo "Downloaded sidecar from release assets."
          else
            echo "Release asset missing — falling back to building the SEA in-run."
            git clone --depth 1 --branch "${ENGINE_TAG}" "https://github.com/${ENGINE_REPO}.git" ../engine-src
            pushd ../engine-src
            npm ci
            npm run build
            node scripts/build-sea.mjs
            # build-sea.mjs emits dist/kosmos-agent-<host-arch-triple>[.exe].
            # The runner's host arch is chosen (via the matrix platform) to
            # match matrix.target, so this name is exactly what we need.
            cp "dist/kosmos-agent-${{ matrix.target }}${{ matrix.binext }}" "../desktop/${dest}"
            popd
          fi
          chmod +x "${dest}" || true
          ls -la src-tauri/binaries

      - name: Acquire standalone 3D viewer (vault-kosmos.html)
        shell: bash
        working-directory: desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Pinned to the viewer release known-good at authoring time. For a
          # future bump, change VIEWER_TAG (or switch to the newest viewer-v*
          # via `gh release list --repo Odenknight/Kosmos-Oden`).
          VIEWER_REPO=Odenknight/Kosmos-Oden
          VIEWER_TAG=viewer-v0.6.9-rc1
          mkdir -p public src-tauri/resources
          echo "Downloading vault-kosmos.html from ${VIEWER_REPO}@${VIEWER_TAG}…"
          gh release download "${VIEWER_TAG}" \
            --repo "${VIEWER_REPO}" \
            --pattern vault-kosmos.html \
            --output src-tauri/resources/vault-kosmos.html --clobber
          test -s src-tauri/resources/vault-kosmos.html
          # Frontend copy: vite copies public/ into the build (frontendDist), so
          # the in-app window can load it over the Tauri protocol. The resources/
          # copy is read at runtime for the browser fallback.
          cp src-tauri/resources/vault-kosmos.html public/vault-kosmos.html
          ls -la public/vault-kosmos.html src-tauri/resources/vault-kosmos.html

      - name: Build unsigned bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No signing config: unsigned build (owner decision 1). macOS
          # notarization is intentionally skipped.
        with:
          projectPath: desktop
          args: --target ${{ matrix.target }}
          # On a desktop-v* tag, publish a GitHub Release with the artifacts and
          # the standard unsigned disclaimer. On workflow_dispatch, artifacts
          # stay attached to the run only.
          tagName: ${{ startsWith(github.ref, 'refs/tags/desktop-v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/desktop-v') && 'GKOS Engine Desktop __VERSION__' || '' }}
          releaseBody: ${{ startsWith(github.ref, 'refs/tags/desktop-v') && 'Unsigned pre-release build. Your OS will warn you when you first open it — this is expected for an unsigned app. See the install guide (desktop/docs/QUICKSTART.md and USER-GUIDE.md) for the macOS right-click → Open / xattr fallback and the Windows SmartScreen More info → Run anyway steps. Loopback-only, read-only, no cloud access.' || '' }}
          releaseDraft: false
          prerelease: true

      - name: Upload run artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/desktop-v') }}
        uses: actions/upload-artifact@v4
        with:
          name: gkos-engine-desktop-${{ matrix.target }}
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: ignore
